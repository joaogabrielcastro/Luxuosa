# Monorepo: a raiz não tem dependências npm. Sem isto, o Nixpacks instala "nada"
# e o build do Vite em frontend/ quebra (sem node_modules).
#
# Use para o serviço do SPA no Coolify com diretório de build = raiz do repositório.
# API: crie outro serviço com "Base Directory" = backend (ou use backend/Dockerfile).

[phases.install]
cmds = ["npm ci --prefix frontend"]

[phases.build]
cmds = ["npm run build --prefix frontend"]

[start]
cmd = "npm run preview --prefix frontend -- --host 0.0.0.0 --port ${PORT:-3000}"
