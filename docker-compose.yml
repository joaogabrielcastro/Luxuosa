services:
  db:
    image: postgres:16-alpine
    container_name: luxuosa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: luxuosa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luxuosa"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxuosa_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/luxuosa
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 1d
      NUVEM_FISCAL_CLIENT_ID: ${NUVEM_FISCAL_CLIENT_ID:-}
      NUVEM_FISCAL_CLIENT_SECRET: ${NUVEM_FISCAL_CLIENT_SECRET:-}
      NUVEM_FISCAL_API_BASE: ${NUVEM_FISCAL_API_BASE:-https://api.sandbox.nuvemfiscal.com.br}
      # Alinhar a backend/.env.example e env.js (NFC-e exige scope nfce)
      NUVEM_FISCAL_OAUTH_SCOPE: ${NUVEM_FISCAL_OAUTH_SCOPE:-empresa nfe nfce}
      NUVEM_FISCAL_AMBIENTE: ${NUVEM_FISCAL_AMBIENTE:-homologacao}
      NUVEM_FISCAL_EMITENTE_CNPJ: ${NUVEM_FISCAL_EMITENTE_CNPJ:-}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luxuosa_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
    ports:
      - "5180:5180"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
